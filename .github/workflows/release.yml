name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            name: vacuum-macos-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: vacuum-macos-arm64
            ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: vacuum-linux-x86_64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: vacuum-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.name }}.tar.gz vacuum
      
      - name: Package (Windows)
        if: matrix.ext == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path vacuum.exe -DestinationPath ../../../${{ matrix.name }}.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            vacuum-macos-x86_64/vacuum-macos-x86_64.tar.gz
            vacuum-macos-arm64/vacuum-macos-arm64.tar.gz
            vacuum-linux-x86_64/vacuum-linux-x86_64.tar.gz
            vacuum-windows-x86_64/vacuum-windows-x86_64.zip
          fail_on_unmatched_files: false
